<div class="customer-portal">
  <!-- Top Navbar -->
  <header class="topbar">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M3 12L12 3L21 12V21H15V15H9V21H3V12Z" fill="#2E7D32" />
      </svg>
      <span>HOME <strong>ASSIST</strong></span>
    </div>

    <div class="user-menu">
      <span class="user-greeting">Welcome, {{ currentUser?.name || 'Customer' }}</span>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </header>

  <div class="portal-body">
    <!-- Sidebar -->
    <aside class="sidebar">
      <nav>
        <a routerLink="/customer" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
          <span class="icon">🏠</span>
          <span>Dashboard</span>
        </a>
        <a routerLink="/customer/bookings" routerLinkActive="active" class="nav-item">
          <span class="icon">📅</span>
          <span>My Bookings</span>
        </a>
        <a routerLink="/customer/profile" routerLinkActive="active" class="nav-item">
          <span class="icon">👤</span>
          <span>Profile Setting</span>
        </a>
        <a routerLink="/services" class="nav-item back-home">
          <span class="icon">🔍</span>
          <span>Book a Service</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
