<div class="profile-container">
  <div class="header">
    <h1>PRO Profile</h1>
    <p>Manage your professional details and business settings.</p>
  </div>

  <div class="profile-card">
    <div class="avatar-section">
      <div class="avatar">{{ getInitials() }}</div>
      <div class="user-info">
        <h3>{{ currentUser?.name }}</h3>
        <p class="role-badge">{{ currentUser?.role }} Partner</p>
      </div>
    </div>

    <form class="profile-form">
      <div class="form-group">
        <label>Professional Name</label>
        <input type="text" [value]="currentUser?.name" readonly class="form-control">
      </div>
      
      <div class="form-group">
        <label>Business Email</label>
        <input type="email" [value]="currentUser?.email" readonly class="form-control">
      </div>

      <div class="form-group">
        <label>Contact Number</label>
        <input type="text" [value]="currentUser?.phone || 'Not provided'" readonly class="form-control">
      </div>

      <div class="form-group">
        <label>Service Area (City)</label>
        <input type="text" value="All Serviceable Areas" readonly class="form-control">
      </div>

      @if (saveSuccess) {
        <div class="success-banner">
          ✅ Business details updated successfully!
        </div>
      }

      <div class="form-actions">
        <button type="button" class="btn-primary" (click)="saveChanges()" [disabled]="saving">
          @if (saving) {
            <span class="spinner"></span> Saving...
          } @else {
            Save Business Details
          }
        </button>
      </div>
    </form>
  </div>
</div>
