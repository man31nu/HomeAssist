<div class="profile-container">
  <div class="header">
    <h1>My Profile</h1>
    <p>Manage your personal information and account settings.</p>
  </div>

  <div class="profile-card">
    <div class="avatar-section">
      <div class="avatar">{{ getInitials() }}</div>
      <div class="user-info">
        <h3>{{ currentUser?.name }}</h3>
        <p class="role-badge">{{ currentUser?.role }}</p>
      </div>
    </div>

    <form class="profile-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [value]="currentUser?.name" readonly class="form-control">
      </div>
      
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [value]="currentUser?.email" readonly class="form-control">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" [value]="currentUser?.phone || 'Not provided'" readonly class="form-control">
      </div>

      @if (saveSuccess) {
        <div class="success-banner">
          ✅ Profile updated successfully!
        </div>
      }

      <div class="form-actions">
        <button type="button" class="btn-primary" (click)="saveChanges()" [disabled]="saving">
          @if (saving) {
            <span class="spinner"></span> Saving...
          } @else {
            Save Changes
          }
        </button>
      </div>
    </form>
  </div>
</div>
